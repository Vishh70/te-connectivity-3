name: "V5 Production Verification"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  verify-backend:
    name: "Backend - Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install all packages except Windows-only ones
          grep -v "pywin32" requirements.txt > requirements_ci.txt
          pip install -r requirements_ci.txt

      - name: Run Backend Smoke Tests (Pytest)
        env:
          CI: "true"
          LOCAL_DEV: "true"
        run: |
          pytest tests/test_api.py -v --no-header

  verify-frontend:
    name: "Frontend - Build Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend (Vite)
        run: |
          cd frontend
          npm run build
