name: "Senior Pro: Production Verification"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Smoke Tests (Pytest)
        run: |
          # Use a mock/dummy strategy for CI where full datasets are missing
          export CI=true
          pytest tests/test_api.py

      - name: Build Frontend (Vite)
        run: |
          cd frontend
          npm install
          npm run build
