name: "V5.5 Master Certification"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  verify-backend:
    name: "Backend - Master Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # Senior Pro: Add caching for faster runs

      - name: Install Master CI Dependencies
        run: |
          python -m pip install --upgrade pip
          # Add pyarrow for parquet support and align with V5.5 requirements
          pip install fastapi[all] httpx pytest pyjwt pandas joblib lightgbm scikit-learn shap pyarrow anyio

      - name: Run Backend Smoke Tests (Pytest)
        env:
          CI: "true"
          LOCAL_DEV: "true"
        run: |
          pytest tests/test_api.py -v --no-header --tb=short

  verify-frontend:
    name: "Frontend - Build Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend (Vite)
        run: |
          cd frontend
          npm run build
